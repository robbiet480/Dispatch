name: UI Tests
permissions:
  contents: read

on:
  pull_request:
  # Nightly full run on main per the testing-tiers doc (the local merge gate
  # runs the smoke tier; this is the full-suite backstop).
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC ≈ 3am ET
  workflow_dispatch:

# One run per PR head; a new push cancels the stale run.
concurrency:
  group: ui-tests-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Detects whether the PR touches anything beyond docs. Heavy jobs skip on
  # docs-only PRs via `if:`; skipped jobs SATISFY required status checks, so
  # no companion no-op workflow is needed (and unlike paths filters, a mixed
  # code+docs PR can never produce duplicate same-named check runs).
  # Trivial git-diff — stays on hosted ubuntu-latest, no reason to burn a mini lane.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.diff.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"   # schedule/dispatch: always run
            exit 0
          fi
          if git diff --name-only "$BASE_SHA"...HEAD | grep -vE '^docs/|\.md$|^\.superpowers/' | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  ios-ui-suite:
    needs: changes
    # Self-hosted runners must never execute fork-PR code (the minis hold the
    # Apple Development signing identity). Same-repo PRs, schedule, and
    # workflow_dispatch only — fork PRs skip (repo policy additionally requires
    # maintainer approval before any external contributor's workflow runs).
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    # Self-hosted M4 mini pool. Two runner instances share one CoreSimulator
    # service, so each job uses a per-instance simulator (see RUNNER_SIM_SUFFIX)
    # to avoid concurrent runs erasing/booting each other's device.
    runs-on: [self-hosted, macOS, dispatch-selfhosted]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Per-instance simulator suffix
        # The `runner` context isn't available in job-level `env:`, so derive the
        # per-instance suffix from the built-in $RUNNER_NAME (= dispatch-a1/a2/…)
        # here. Two instances share one CoreSimulator service; a distinct device
        # name per instance keeps concurrent runs from clobbering each other.
        run: echo "RUNNER_SIM_SUFFIX=${RUNNER_NAME}" >> "$GITHUB_ENV"
      - name: Homebrew on PATH
        # LaunchAgent PATH is minimal; brew tools (xcodegen/xcbeautify) live here.
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
      - name: Select Xcode
        # Runner defaults to CommandLineTools; point at full Xcode without sudo.
        run: |
          # Fail fast if no Xcode is installed — a silent empty glob would
          # otherwise write a bogus DEVELOPER_DIR and fail confusingly later.
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$XCODE_APP" ] || { echo "::error::No Xcode found in /Applications on this runner"; exit 1; }
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
      - name: Verify runner toolchain
        # xcodegen/xcbeautify are pre-installed on the minis (runner setup doc),
        # not brewed per run; the iOS simulator SDK ships with Xcode, so no
        # downloadPlatform step either. DerivedData persists on the runner's
        # local disk between jobs (no cache) — outside the workspace, since
        # checkout's default `git clean -ffdx` wipes in-workspace ignored dirs.
        # Fail fast with a clear message if the runner was reprovisioned
        # without the tools.
        run: |
          for tool in xcodegen xcbeautify; do
            command -v "$tool" >/dev/null || { echo "::error::$tool missing on self-hosted runner — brew install it (see runner setup doc)"; exit 1; }
          done
      - name: Generate project
        run: xcodegen generate
      - name: Ensure fresh per-instance simulator
        # The suite pins iPhone 17 Pro (docs/testing-tiers.md). A per-instance
        # device name (suffix = runner name) keeps the two instances sharing one
        # CoreSimulator service from ever touching each other's device. All
        # simctl operations and the -destination use the resolved UDID, never
        # the name: a stale unavailable same-name device (left by a runtime
        # upgrade) would make name-addressing ambiguous. The erase restores
        # hosted-style fresh app state each run — persistent sims keep plan-38
        # throttle / plan-42 already-submitted artifacts (PR #76 triage).
        run: |
          DEVICE="iPhone 17 Pro-${RUNNER_SIM_SUFFIX}"
          # Drop stale same-name devices whose runtime is gone (grep -F: the
          # runner-derived name must never be interpreted as a regex).
          xcrun simctl list devices | grep -F "${DEVICE} (" | grep -F "unavailable" | grep -Eo "[0-9A-F]{8}-[0-9A-F-]{27}" | while read -r stale; do
            echo "deleting stale unavailable device $stale"
            xcrun simctl delete "$stale" || true
          done
          UDID=$(xcrun simctl list devices available | grep -F "${DEVICE} (" | grep -Eo "[0-9A-F]{8}-[0-9A-F-]{27}" | head -1)
          if [ -z "$UDID" ]; then
            RUNTIME=$(xcrun simctl list runtimes available | grep -Eo "com.apple.CoreSimulator.SimRuntime.iOS[0-9-]+" | sort -V | tail -1)
            [ -n "$RUNTIME" ] || { echo "::error::No iOS simulator runtime available on this runner — install one via Xcode"; exit 1; }
            UDID=$(xcrun simctl create "${DEVICE}" "iPhone 17 Pro" "$RUNTIME")
          fi
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          xcrun simctl erase "$UDID"
      - name: Run full UI suite
        # -retry-tests-on-failure absorbs the known swift-testing signal-11
        # runner flake (one retry, matching the local merge-gate convention).
        # Clone-parallelism: 2 workers per job — capped deliberately, NOT auto:
        # each clone is a booted sim (~1.5GB) and two runner instances share a
        # 16GB M4, so worst case is 2 jobs x 2 clones + builds per box. Clones
        # get independent data containers (a test-isolation bonus).
        run: |
          set -o pipefail
          xcodebuild test \
            -project Dispatch.xcodeproj \
            -scheme DispatchApp \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -derivedDataPath "$HOME/ci-cache/${RUNNER_NAME}/DerivedData-ui" \
            -resultBundlePath ui-tests.xcresult \
            -retry-tests-on-failure \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            | xcbeautify --renderer github-actions || exit ${PIPESTATUS[0]}
      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-tests-xcresult
          path: ui-tests.xcresult
          retention-days: 7

  ipad-ui-suite:
    needs: changes
    # Fork-PR gate: same rationale as ios-ui-suite (self-hosted runners hold
    # the signing identity; fork PRs must never execute here).
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    # EXPERIMENTAL / non-blocking: the suite has only ever run on iPhone and
    # some tests encode compact-width assumptions (HomeParity, sheet vs
    # popover). Gathering pass/fail data first; promote to blocking once the
    # suite is triaged iPad-clean (then drop continue-on-error).
    # Self-hosted M4 mini pool; per-instance simulator isolation via RUNNER_SIM_SUFFIX.
    runs-on: [self-hosted, macOS, dispatch-selfhosted]
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Per-instance simulator suffix
        # See ios-ui-suite: derive per-instance suffix from $RUNNER_NAME because
        # the `runner` context is unavailable in job-level `env:`.
        run: echo "RUNNER_SIM_SUFFIX=${RUNNER_NAME}" >> "$GITHUB_ENV"
      - name: Homebrew on PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
      - name: Select Xcode
        run: |
          # Fail fast if no Xcode is installed — a silent empty glob would
          # otherwise write a bogus DEVELOPER_DIR and fail confusingly later.
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$XCODE_APP" ] || { echo "::error::No Xcode found in /Applications on this runner"; exit 1; }
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
      - name: Verify runner toolchain
        # Fail fast if the runner is missing pre-installed tools — see ios-ui-suite.
        run: |
          for tool in xcodegen xcbeautify; do
            command -v "$tool" >/dev/null || { echo "::error::$tool missing on self-hosted runner — brew install it (see runner setup doc)"; exit 1; }
          done
      - name: Generate project
        run: xcodegen generate
      - name: Ensure fresh per-instance simulator
        # UDID-addressed per-instance device with stale-device cleanup and a
        # fresh-state erase — see ios-ui-suite for the full rationale.
        run: |
          DEVICE="iPad Pro 13-inch (M5)-${RUNNER_SIM_SUFFIX}"
          xcrun simctl list devices | grep -F "${DEVICE} (" | grep -F "unavailable" | grep -Eo "[0-9A-F]{8}-[0-9A-F-]{27}" | while read -r stale; do
            echo "deleting stale unavailable device $stale"
            xcrun simctl delete "$stale" || true
          done
          UDID=$(xcrun simctl list devices available | grep -F "${DEVICE} (" | grep -Eo "[0-9A-F]{8}-[0-9A-F-]{27}" | head -1)
          if [ -z "$UDID" ]; then
            RUNTIME=$(xcrun simctl list runtimes available | grep -Eo "com.apple.CoreSimulator.SimRuntime.iOS[0-9-]+" | sort -V | tail -1)
            [ -n "$RUNTIME" ] || { echo "::error::No iOS simulator runtime available on this runner — install one via Xcode"; exit 1; }
            UDID=$(xcrun simctl create "${DEVICE}" "iPad Pro 13-inch (M5)" "$RUNTIME")
          fi
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          xcrun simctl erase "$UDID"
      - name: Run full UI suite on iPad
        # Clone-parallelism: same 2-worker cap + rationale as ios-ui-suite.
        run: |
          set -o pipefail
          xcodebuild test \
            -project Dispatch.xcodeproj \
            -scheme DispatchApp \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -derivedDataPath "$HOME/ci-cache/${RUNNER_NAME}/DerivedData-ui-ipad" \
            -resultBundlePath ipad-ui-tests.xcresult \
            -retry-tests-on-failure \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            | xcbeautify --renderer github-actions || exit ${PIPESTATUS[0]}
      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ipad-ui-tests-xcresult
          path: ipad-ui-tests.xcresult
          retention-days: 7

  mac-ui-smoke:
    needs: changes
    # Self-hosted runner + real signing identity: never run fork-PR code here.
    # Same-repo PRs, schedule, and workflow_dispatch only — fork PRs skip this
    # job (repo policy additionally requires maintainer approval before any
    # fork workflow runs; maintainer review is the gate for those).
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    # Self-hosted M4 mini: the Mac app carries app-sandbox + iCloud entitlements
    # that launchd refuses to spawn under ad-hoc signing (Runningboard error 5).
    # Hosted runners can't launch it at all; a real Apple Development identity +
    # the team provisioning profile (in the mini's login keychain, reached via a
    # GUI-session LaunchAgent) sign it so it launches. See docs/testing-tiers.md.
    runs-on: [self-hosted, macOS, dispatch-selfhosted]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Homebrew on PATH
        # LaunchAgent PATH is minimal; brew tools (xcodegen/xcbeautify) live here.
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
      - name: Select Xcode
        # Runner defaults to CommandLineTools; point at full Xcode without sudo.
        run: |
          # Fail fast if no Xcode is installed — a silent empty glob would
          # otherwise write a bogus DEVELOPER_DIR and fail confusingly later.
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$XCODE_APP" ] || { echo "::error::No Xcode found in /Applications on this runner"; exit 1; }
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
      - name: Verify runner toolchain
        # Tools are pre-installed on the minis (runner setup doc), not brewed per
        # run. Fail fast with a clear message if the runner was reprovisioned
        # without them, instead of a confusing mid-job failure.
        run: |
          for tool in xcodegen xcbeautify; do
            command -v "$tool" >/dev/null || { echo "::error::$tool missing on self-hosted runner — brew install it (see runner setup doc)"; exit 1; }
          done
      - name: Generate project
        run: xcodegen generate
      - name: Run Mac UI smoke (real dev signing)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Dispatch.xcodeproj \
            -scheme DispatchMac \
            -destination 'platform=macOS' \
            -derivedDataPath "$HOME/ci-cache/${RUNNER_NAME}/DerivedData-mac" \
            -resultBundlePath mac-smoke.xcresult \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=UTQFCBPQRF \
            | xcbeautify --renderer github-actions || exit ${PIPESTATUS[0]}
      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mac-smoke-xcresult
          path: mac-smoke.xcresult
          retention-days: 7
  watch-ui-tests:
    # Functional watch UI tests. Non-blocking initially: watchOS
    # XCUITest is inherently flakier than iOS (see PR body); promote once a
    # week of CI history is clean.
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Ensure watchOS platform
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -q watchsimulator; then
            exit 0
          fi
          for i in 1 2 3; do
            sudo xcodebuild -downloadPlatform watchOS && exit 0
            sleep 30
          done
          exit 1
      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify
      - name: Generate project
        run: xcodegen generate
      - name: Ensure simulator
        run: |
          # The runner image ships several "Apple Watch Ultra 3 (49mm)" sims —
          # one per installed watchOS runtime — so a name-only destination is
          # ambiguous ("multiple devices matched"). Resolve a concrete UDID on
          # the newest installed runtime (explicit sort -V on the
          # "-- watchOS X.Y --" section headers), or create one, and pin the
          # destination to it. `|| true` keeps the empty-UDID fallback
          # reachable even if this pipeline ever runs under pipefail.
          UDID=$(xcrun simctl list devices available \
            | awk '/^-- watchOS/ { ver=$3 } /Apple Watch Ultra 3 \(49mm\) \(/ { if (match($0, /[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}/)) print ver, substr($0, RSTART, RLENGTH) }' \
            | sort -V | tail -1 | awk '{ print $2 }' || true)
          if [ -z "$UDID" ]; then
            RUNTIME=$(xcrun simctl list runtimes | grep -Eo "com.apple.CoreSimulator.SimRuntime.watchOS[0-9-]+" | sort -V | tail -1)
            UDID=$(xcrun simctl create "Apple Watch Ultra 3 (49mm)" "Apple Watch Ultra 3 (49mm)" "$RUNTIME")
          fi
          echo "WATCH_SIM_UDID=$UDID" >> "$GITHUB_ENV"
      - name: Run watch UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Dispatch.xcodeproj \
            -scheme DispatchWatch \
            -destination "platform=watchOS Simulator,id=$WATCH_SIM_UDID" \
            -only-testing:DispatchWatchUITests/WatchAppUITests \
            -resultBundlePath watch-ui.xcresult \
            -retry-tests-on-failure \
            | xcbeautify --renderer github-actions || exit ${PIPESTATUS[0]}
      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: watch-ui-xcresult
          path: watch-ui.xcresult
          retention-days: 7
