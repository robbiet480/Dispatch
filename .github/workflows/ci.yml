name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    # macOS 26 image required: DispatchKit links SwiftData symbols that only
    # exist in the macOS 26 runtime (an older host dlopen-fails the test bundle
    # even though the Xcode 26 SDK compiles it).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      # Cache keys are prefixed with the selected Xcode's build version so a
      # runner-image toolchain bump can't serve module caches built by an
      # older compiler (stale exact-key hits are never re-saved and would
      # self-perpetuate otherwise).
      - name: Capture Xcode version for cache keys
        id: xcode
        run: echo "v=$(xcodebuild -version | tr '\n' '-' | tr -d ' ')" >> "$GITHUB_OUTPUT"
      # DispatchKit has no external dependencies (no Package.resolved), so
      # the win here is incremental-build reuse of .build across runs: the
      # exact key matches only identical sources, and restore-keys fall back
      # to the newest previous cache so unchanged files aren't recompiled.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ steps.xcode.outputs.v }}-${{ hashFiles('Package.swift', 'Sources/**', 'Tests/**') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ steps.xcode.outputs.v }}-
      - name: Run DispatchKit tests
        run: swift test
  build-app:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Ensure iOS platform
        # macos-26 images now pre-install the iOS SDK + simulator runtimes
        # (see actions/runner-images macos-26-arm64 readme), so this is a
        # no-op check in the common case. The download path survives as a
        # fallback because the generic-simulator build below needs the
        # iphonesimulator SDK, and image regressions here have happened
        # before (downloadPlatform is flaky on runners — transient exit 70 —
        # hence the retries).
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -q iphonesimulator; then
            echo "iOS simulator SDK pre-installed; skipping download"
            exit 0
          fi
          for i in 1 2 3; do
            sudo xcodebuild -downloadPlatform iOS && exit 0
            echo "downloadPlatform attempt $i failed; retrying in 30s"
            sleep 30
          done
          echo "iOS platform download failed after 3 attempts"; exit 1
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      # Same Xcode-version prefixing rationale as the SwiftPM cache above.
      - name: Capture Xcode version for cache keys
        id: xcode
        run: echo "v=$(xcodebuild -version | tr '\n' '-' | tr -d ' ')" >> "$GITHUB_OUTPUT"
      # DerivedData reuse between runs (pinned via -derivedDataPath so the
      # path is cacheable): the exact key matches only identical inputs;
      # restore-keys fall back to the newest previous cache so xcodebuild's
      # incremental engine skips unchanged files.
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: DerivedData
          key: dd-${{ runner.os }}-${{ steps.xcode.outputs.v }}-${{ hashFiles('project.yml', 'Package.swift', 'App/**', 'Widgets/**', 'Sources/**') }}
          restore-keys: |
            dd-${{ runner.os }}-${{ steps.xcode.outputs.v }}-
      - name: Build app
        # generic simulator destination: compiles against the SDK without
        # requiring a concrete simulator runtime to be installed on the image.
        run: xcodebuild -project Dispatch.xcodeproj -scheme DispatchApp -destination 'generic/platform=iOS Simulator' -derivedDataPath DerivedData build
