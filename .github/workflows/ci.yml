name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    # macOS 26 image required: DispatchKit links SwiftData symbols that only
    # exist in the macOS 26 runtime (an older host dlopen-fails the test bundle
    # even though the Xcode 26 SDK compiles it).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Run DispatchKit tests
        run: swift test
  build-app:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        # generic simulator destination: compiles against the SDK without
        # requiring a concrete simulator runtime to be installed on the image.
        run: xcodebuild -project Dispatch.xcodeproj -scheme DispatchApp -destination 'generic/platform=iOS Simulator' build
