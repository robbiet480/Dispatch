name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    # macOS 26 image required: DispatchKit links SwiftData symbols that only
    # exist in the macOS 26 runtime (an older host dlopen-fails the test bundle
    # even though the Xcode 26 SDK compiles it).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Run DispatchKit tests
        run: swift test
  build-app:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Install iOS platform
        # Xcode 26 ships the iOS simulator platform as a separate download,
        # and CI images may omit it. The download is occasionally flaky on
        # runners (transient exit 70), so retry with backoff and skip when
        # a runtime is already present.
        run: |
          if xcrun simctl runtime list 2>/dev/null | grep -q "iOS"; then
            echo "iOS platform already installed"; exit 0
          fi
          for i in 1 2 3; do
            sudo xcodebuild -downloadPlatform iOS && exit 0
            echo "downloadPlatform attempt $i failed; retrying in 30s"
            sleep 30
          done
          echo "iOS platform download failed after 3 attempts"; exit 1
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        # generic simulator destination: compiles against the SDK without
        # requiring a concrete simulator runtime to be installed on the image.
        run: xcodebuild -project Dispatch.xcodeproj -scheme DispatchApp -destination 'generic/platform=iOS Simulator' build
