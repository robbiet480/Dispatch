name: CodeQL
permissions:
  contents: read
  security-events: write

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # weekly full scan

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-swift:
    # Swift needs manual build mode: the .xcodeproj is XcodeGen-generated
    # (never committed), so CodeQL's autobuild has nothing to discover —
    # its default-setup run failed with "unable to automatically build".
    # NOTE: requires CodeQL DEFAULT SETUP to be DISABLED in repo settings
    # (Settings → Advanced Security), or GitHub rejects these results.
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build (traced)
        # Building the iOS app target compiles app + kit + widget Swift under
        # CodeQL's tracer. Generic destination avoids needing a booted sim.
        run: |
          xcodegen generate
          xcodebuild -project Dispatch.xcodeproj -scheme DispatchApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"

  analyze-actions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: actions
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:actions"

  analyze-python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
