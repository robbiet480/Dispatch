name: CodeQL
permissions:
  contents: read
  security-events: write

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # weekly full scan

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Scopes PR analysis to the languages actually touched. Non-PR events
  # (push to main, weekly schedule, dispatch) analyze everything.
  changes:
    runs-on: ubuntu-latest
    outputs:
      actions: ${{ steps.diff.outputs.actions }}
      python: ${{ steps.diff.outputs.python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "actions=true" >> "$GITHUB_OUTPUT"
            echo "python=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD)
          echo "$CHANGED" | grep -qE '^\.github/workflows/' && echo "actions=true" >> "$GITHUB_OUTPUT" || echo "actions=false" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -qE '\.py$' && echo "python=true" >> "$GITHUB_OUTPUT" || echo "python=false" >> "$GITHUB_OUTPUT"

  analyze-swift:
    # NOT run on pull_request: the traced build occupies a macOS runner for
    # ~20 min and competes with the REQUIRED ios-ui-suite check for the
    # scarce macos-26 pool — Swift findings are want-to-know, not
    # merge-blocking. Runs on every main push + the weekly schedule instead.
    if: github.event_name != 'pull_request'
    # Swift needs manual build mode: the .xcodeproj is XcodeGen-generated
    # (never committed), so CodeQL's autobuild has nothing to discover —
    # its default-setup run failed with "unable to automatically build".
    # Tooling installs run BEFORE CodeQL init: the injected tracer forces
    # subsequent brew invocations under Rosetta, which Homebrew refuses on
    # the ARM prefix. Only the build itself needs (and gets) the tracer.
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Ensure iOS platform
        # Same guard + retry as ci.yml/ui-tests.yml — image regressions here
        # have happened before, and a failed build skips the CodeQL upload.
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -q iphonesimulator; then
            exit 0
          fi
          for i in 1 2 3; do
            sudo xcodebuild -downloadPlatform iOS && exit 0
            sleep 30
          done
          exit 1
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual
      - name: Build (traced)
        # Building the iOS app target compiles app + kit + widget Swift under
        # CodeQL's tracer. Generic destination avoids needing a booted sim.
        run: |
          xcodebuild -project Dispatch.xcodeproj -scheme DispatchApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"

  analyze-actions:
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: actions
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:actions"

  analyze-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
