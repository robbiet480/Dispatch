name: Dispatch
options:
  bundleIdPrefix: io.robbie
  deploymentTarget:
    iOS: "26.0"
packages:
  DispatchKit:
    path: .
targets:
  DispatchApp:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - path: App/Assets.xcassets
      - path: App/PrivacyInfo.xcprivacy
    dependencies:
      - package: DispatchKit
    settings:
      base:
        PRODUCT_NAME: Dispatch
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch
        PRODUCT_MODULE_NAME: DispatchApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CURRENT_PROJECT_VERSION: 5
        MARKETING_VERSION: 0.1.0
        DEVELOPMENT_TEAM: UTQFCBPQRF
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Dispatch samples the ambient sound level (a decibel number only, no recording is kept) when you file a report."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Dispatch counts how many photos you took since your last report."
        CODE_SIGN_ENTITLEMENTS: App/Dispatch.entitlements
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Dispatch records where you are when you file a report."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Dispatch reads steps, flights, heart rate, HRV, sleep, workouts, and caffeine to add context to your reports, and can also log State of Mind entries you choose to record."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Dispatch logs State of Mind entries to Apple Health when you answer questions you've marked to track your mood."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_NSFocusStatusUsageDescription: "Dispatch records whether a Focus is on when you file a report."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Dispatch uses Face ID to unlock the app."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # Partial plist merged into the generated Info.plist — carries
        # UIBackgroundModes (remote-notification for CloudKit silent pushes),
        # which has no INFOPLIST_KEY_* build-setting equivalent.
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
  DispatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [AppUITests]
    dependencies:
      - target: DispatchApp
    settings:
      base:
        TEST_TARGET_NAME: DispatchApp
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
schemes:
  DispatchApp:
    build:
      targets:
        DispatchApp: all
        DispatchUITests: [test]
    test:
      targets: [DispatchUITests]
