name: Dispatch
options:
  bundleIdPrefix: io.robbie
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
packages:
  DispatchKit:
    path: .
  # Spotify App Remote (plan 26). Distribution verified 2026-07-10: the repo
  # ships a Package.swift whose single product is a binaryTarget pointing at
  # the in-repo SpotifyiOS.xcframework, so plain SPM consumption works — no
  # vendored binary needed here. ObjC framework; latest release v5.0.1.
  SpotifyiOS:
    url: https://github.com/spotify/ios-sdk
    exactVersion: 5.0.1
targets:
  DispatchApp:
    type: application
    platform: iOS
    sources:
      - App/Sources
      # Shared sensor providers (plan 19): dual target membership with
      # DispatchWatch — the QuickAnswerIntent pattern, one directory over.
      # DispatchKit stays Foundation/SwiftData-only, so the CoreLocation/
      # WeatherKit/HealthKit/battery providers compile into BOTH app targets
      # from this group instead of moving into the kit.
      - path: Shared/Providers
      - path: App/Assets.xcassets
      - path: App/PrivacyInfo.xcprivacy
    dependencies:
      - package: DispatchKit
      - package: SpotifyiOS
      - target: DispatchWidgets
      # Companion watch app (plan 19): embedded in the iOS bundle's Watch/
      # directory. Independent (WKRunsIndependentlyOfCompanionApp) — it syncs
      # through CloudKit, never WatchConnectivity or the phone's App Group.
      - target: DispatchWatch
    settings:
      base:
        PRODUCT_NAME: Dispatch
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch
        PRODUCT_MODULE_NAME: DispatchApp
        GENERATE_INFOPLIST_FILE: YES
        # Home-screen label. Without this the bundle has no display name and
        # TestFlight/App Store installs fall back to the ASC app name
        # ("Dispatch - Life Logger", which only exists because plain
        # "Dispatch" was taken on the App Store).
        INFOPLIST_KEY_CFBundleDisplayName: Dispatch
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CURRENT_PROJECT_VERSION: 26
        MARKETING_VERSION: 1.0
        DEVELOPMENT_TEAM: UTQFCBPQRF
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Dispatch samples the ambient sound level (a decibel number only, no recording is kept) when you file a report."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Dispatch counts how many photos you took since your last report."
        CODE_SIGN_ENTITLEMENTS: App/Dispatch.entitlements
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Dispatch records where you are when you file a report."
        # Purpose string only, NOT an entitlement (plan 16 hard constraint) —
        # required alongside the when-in-use string for the editor-contextual
        # requestAlwaysAuthorization() upgrade that visit-arrival groups use.
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Dispatch uses Apple's power-efficient visit detection to prompt you when you arrive somewhere, even when the app is closed. Only used if a prompt group is scheduled on arrivals."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Dispatch reads steps, flights, heart rate, HRV, sleep, workouts, and caffeine to add context to your reports, and can also log State of Mind entries you choose to record."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Dispatch logs State of Mind entries to Apple Health when you answer questions you've marked to track your mood."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_NSFocusStatusUsageDescription: "Dispatch records whether a Focus is on when you file a report."
        # Purpose string only, NOT an entitlement (plan 22 hard constraint):
        # optional contact-name suggestions for people questions. Contact
        # identifiers and photos never leave the device.
        INFOPLIST_KEY_NSContactsUsageDescription: "Dispatch suggests names and photos from your Contacts when you answer people questions. Contact links stay on this device and are never synced."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Dispatch uses Face ID to unlock the app."
        # Plan 24 webhooks: delivering to a LAN host (http://192.168.x.x /
        # .local) triggers iOS's local-network prompt — purpose string only,
        # NOT an entitlement. Pairs with the scoped NSAllowsLocalNetworking
        # ATS key in App/Info.plist.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Dispatch delivers report webhooks to servers on your network when you configure one."
        INFOPLIST_KEY_NSMotionUsageDescription: "Dispatch counts flights of stairs you walked down (via the motion coprocessor) to pair with the flights climbed from Health."
        # Plan 27 (iPad): per-idiom orientation keys. iPhone stays
        # portrait-only (unchanged); iPad supports all four — required for
        # App Store submission without UIRequiresFullScreen, and it keeps
        # Split View/Slide Over multitasking available.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        # Plan 26 media sensor. Purpose string only, NOT an entitlement.
        INFOPLIST_KEY_NSAppleMusicUsageDescription: "Dispatch notes what's playing (song, artist, album — never any audio) when you file a report."
        # Plan 16 backups: expose Documents (→ Backups/) in the Files app
        # ("On My iPhone → Dispatch") and Finder. Plain Info.plist key, NOT
        # an entitlement — no provisioning-profile impact. Its companion
        # UIFileSharingEnabled has no working INFOPLIST_KEY_* build setting
        # and lives in App/Info.plist instead (verified in the built plist).
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        # Partial plist merged into the generated Info.plist — carries
        # UIBackgroundModes (remote-notification for CloudKit silent pushes),
        # which has no INFOPLIST_KEY_* build-setting equivalent.
        INFOPLIST_FILE: App/Info.plist
        # Plan 27: iPhone + iPad.
        TARGETED_DEVICE_FAMILY: "1,2"
  DispatchWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets/Sources
      # Dual target membership (Apple: "Creating controls to perform actions
      # across the system" → "Open your app with a control"): the Control
      # Center intent must be compiled into BOTH the app (via App/Sources
      # above) and this extension, so the system opens the app and runs
      # perform() in the app process.
      - path: App/Sources/Intents/StartReportControlIntent.swift
      # Same dual-membership pattern for the interactive-widget quick-answer
      # intent: Button(intent:) in the widget view needs the type compiled
      # into this extension; unlike the control intent, its perform() RUNS
      # HERE in the widget-extension process (probe-verified — see the
      # comment in QuickAnswerIntent.swift).
      - path: App/Sources/Intents/QuickAnswerIntent.swift
      - path: Widgets/PrivacyInfo.xcprivacy
    dependencies:
      - package: DispatchKit
    settings:
      base:
        PRODUCT_NAME: DispatchWidgets
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch.widgets
        GENERATE_INFOPLIST_FILE: YES
        # Extension CFBundleShortVersionString/CFBundleVersion must match the
        # host app's or App Store validation rejects the archive.
        CURRENT_PROJECT_VERSION: 26
        MARKETING_VERSION: 1.0
        DEVELOPMENT_TEAM: UTQFCBPQRF
        SWIFT_VERSION: 6.0
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widgets/DispatchWidgets.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Dispatch
        # Partial plist merge (same pattern as the app target's
        # UIBackgroundModes): NSExtension has no INFOPLIST_KEY_* equivalent.
        INFOPLIST_FILE: Widgets/Info.plist
        # Plan 27: widgets must match the host app's device families so
        # they're installable on iPad.
        TARGETED_DEVICE_FAMILY: "1,2"
  DispatchWatch:
    type: application
    platform: watchOS
    sources:
      - Watch/Sources
      # Shared sensor providers (plan 19): dual target membership with
      # DispatchApp — same pattern as the QuickAnswerIntent/control-intent
      # sharing into DispatchWidgets. DispatchKit stays Foundation/SwiftData-
      # only; the system-framework providers compile into both app targets.
      # Location/Weather/Health compile unchanged on watchOS; battery is the
      # sole platform conditional (#if os(watchOS) → WKInterfaceDevice).
      - path: Shared/Providers
      - path: Watch/Assets.xcassets
      - path: Watch/PrivacyInfo.xcprivacy
    dependencies:
      - package: DispatchKit
      - target: DispatchWatchWidgets
    settings:
      base:
        PRODUCT_NAME: Dispatch
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch.watchkitapp
        PRODUCT_MODULE_NAME: DispatchWatch
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Dispatch
        # Versions mirror the iOS targets (archive-validation constraint —
        # the controller bumps all four targets together at ship time).
        CURRENT_PROJECT_VERSION: 26
        MARKETING_VERSION: 1.0
        DEVELOPMENT_TEAM: UTQFCBPQRF
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
        CODE_SIGN_ENTITLEMENTS: Watch/DispatchWatch.entitlements
        # Watch-side permission purpose strings (design §v1-scope-3): the
        # watch requests HealthKit + when-in-use location itself — Apple:
        # frameworks supporting independent watch apps "display their
        # authorization form directly on Apple Watch"
        # (https://developer.apple.com/documentation/watchos-apps/creating-independent-watchos-apps).
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Dispatch reads steps, flights, heart rate, HRV, sleep, workouts, and caffeine to add context to your reports."
        # Required even though the watch only reads: the HealthKit binary
        # linkage makes ASC's upload analyzer demand both strings (rejected
        # build 20 upload, code 90683).
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Dispatch logs State of Mind entries to Apple Health when you answer questions you've marked to track your mood."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Dispatch records where you are when you file a report."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # Partial plist merge (same pattern as the iOS targets): the WK*
        # keys (WKApplication, WKCompanionAppBundleIdentifier,
        # WKRunsIndependentlyOfCompanionApp) live in Watch/Info.plist.
        INFOPLIST_FILE: Watch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
  DispatchWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - WatchWidgets/Sources
      - path: WatchWidgets/PrivacyInfo.xcprivacy
    dependencies:
      - package: DispatchKit
    settings:
      base:
        PRODUCT_NAME: DispatchWatchWidgets
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch.watchkitapp.widgets
        GENERATE_INFOPLIST_FILE: YES
        # Extension versions must match the host app's (ASC validation).
        CURRENT_PROJECT_VERSION: 26
        MARKETING_VERSION: 1.0
        DEVELOPMENT_TEAM: UTQFCBPQRF
        SWIFT_VERSION: 6.0
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: WatchWidgets/DispatchWatchWidgets.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Dispatch
        # Partial plist merge: NSExtension has no INFOPLIST_KEY_* equivalent.
        INFOPLIST_FILE: WatchWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
  DispatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [AppUITests]
    dependencies:
      - target: DispatchApp
    settings:
      base:
        TEST_TARGET_NAME: DispatchApp
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
        # Plan 27: the UI-test bundle must run on iPad simulators too.
        TARGETED_DEVICE_FAMILY: "1,2"
  # Hostless unit bundle (PR #41 review): pure view-layer math that belongs
  # app-side (not DispatchKit) but deserves real unit tests. Sources under
  # test are compiled directly into the bundle — no TEST_HOST/app injection.
  DispatchAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
      - path: App/Sources/Visualizations/OptionBlockLayout.swift
      # PLAN-39 TASK 0 PROBE — remove after measurement.
      - path: App/Sources/Providers/SleepDeliveryProbe.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.robbie.Dispatch.apptests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  DispatchApp:
    build:
      targets:
        DispatchApp: all
        DispatchUITests: [test]
        DispatchAppTests: [test]
    test:
      targets: [DispatchAppTests, DispatchUITests]
  DispatchWatch:
    build:
      targets:
        DispatchWatch: all
